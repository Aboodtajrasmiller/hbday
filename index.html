<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Software Security MCQ Exam | English Questions & Arabic Explanation</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --primary: #4f8cff;
            --primary-glow: #4f8cff55;
            --accent: #00d4aa;
            --danger: #ff4757;
            --warning: #ffa502;
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --border: #2a2a40;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, #1a3a5c22 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, #0d2b4522 0%, transparent 60%),
                radial-gradient(ellipse at 50% 10%, #4f8cff11 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.15;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.2;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow), 0 0 0 1px #ffffff08 inset;
            overflow: hidden;
            transition: all var(--transition);
        }

        .app-header {
            background: var(--surface2);
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .app-header .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .app-header .logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f8cff, #00d4aa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px #4f8cff44;
        }
        .app-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            color: var(--text2);
            margin-top: 2px;
        }
        .header-stats {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .stat-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }
        .timer-badge {
            background: #1a1a2e;
            border: 2px solid var(--warning);
            color: var(--warning);
            animation: pulse-timer 2s ease-in-out infinite;
        }
        @keyframes pulse-timer {
            0%,
            100% {
                border-color: var(--warning);
                box-shadow: 0 0 0px #ffa50200;
            }
            50% {
                border-color: #ffa50288;
                box-shadow: 0 0 16px #ffa50233;
            }
        }

        .progress-wrap {
            padding: 6px 28px;
            background: #0a0a14;
        }
        .progress-outer {
            height: 6px;
            background: #2a2a40;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: linear-gradient(90deg, #4f8cff, #00d4aa);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 12px #4f8cff66;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 6px;
            padding: 0 2px;
        }

        .quiz-body {
            padding: 28px;
            min-height: 400px;
        }
        .question-card {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 24px 28px;
            border: 1px solid var(--border);
            animation: fadeSlideIn 0.4s ease;
            transition: all var(--transition);
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .question-number {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 22px;
            line-height: 1.6;
        }
        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: #1a1a30;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            color: var(--text);
            user-select: none;
            position: relative;
        }
        .option-item:hover {
            border-color: #4f8cff66;
            background: #1e1e3a;
            box-shadow: 0 4px 16px #00000033;
            transform: translateX(-3px);
        }
        .option-item.selected {
            border-color: var(--primary);
            background: #1a2a4a;
            box-shadow: 0 0 20px var(--primary-glow);
            color: #fff;
            font-weight: 600;
        }
        .option-radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #555;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .option-item.selected .option-radio {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        .option-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .option-item.selected .option-radio::after {
            opacity: 1;
        }
        .option-letter {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.85rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .option-item.selected .option-letter {
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            padding: 0 28px 28px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .btn {
            padding: 13px 28px;
            border-radius: 28px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            letter-spacing: 0.2px;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-prev {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-prev:hover {
            border-color: #888;
            color: #fff;
        }
        .btn-next {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 16px #4f8cff44;
            margin-right: auto;
        }
        .btn-next:hover {
            background: #5a9aff;
            box-shadow: 0 6px 24px #4f8cff66;
            transform: translateY(-2px);
        }
        .btn-submit {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: #000;
            font-weight: 800;
            box-shadow: 0 4px 20px #00d4aa44;
            animation: glow-pulse 2s ease-in-out infinite;
        }
        @keyframes glow-pulse {
            0%,
            100% {
                box-shadow: 0 4px 20px #00d4aa44;
            }
            50% {
                box-shadow: 0 8px 36px #00d4aa77;
            }
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px #00d4aa66;
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .results-container {
            padding: 28px;
            animation: fadeSlideIn 0.5s ease;
        }
        .results-hero {
            text-align: center;
            padding: 20px 0 28px;
        }
        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 16px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(#00d4aa calc(var(--score-pct) * 1%),
                    #2a2a40 calc(var(--score-pct) * 1%));
            box-shadow: 0 0 40px #00000055;
        }
        .score-inner {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-number {
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
        }
        .score-total {
            font-size: 0.8rem;
            color: var(--text2);
        }
        .results-grade {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .grade-excellent {
            color: #00d4aa;
        }
        .grade-good {
            color: #4f8cff;
        }
        .grade-fair {
            color: #ffa502;
        }
        .grade-poor {
            color: #ff4757;
        }
        .results-stats {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .result-stat {
            background: var(--surface2);
            border-radius: 14px;
            padding: 14px 20px;
            text-align: center;
            border: 1px solid var(--border);
            min-width: 80px;
        }
        .result-stat .val {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .result-stat .lbl {
            font-size: 0.7rem;
            color: var(--text2);
            margin-top: 2px;
        }
        .val.correct {
            color: #00d4aa;
        }
        .val.wrong {
            color: #ff4757;
        }
        .val.skipped {
            color: #ffa502;
        }

        .review-section {
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 6px;
        }
        .review-section::-webkit-scrollbar {
            width: 5px;
        }
        .review-section::-webkit-scrollbar-thumb {
            background: #3a3a55;
            border-radius: 10px;
        }
        .review-card {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .review-card.correct-card {
            border-left: 4px solid #00d4aa;
        }
        .review-card.wrong-card {
            border-left: 4px solid #ff4757;
        }
        .review-card.skipped-card {
            border-left: 4px solid #ffa502;
        }
        .review-q {
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
            font-size: 0.95rem;
        }
        .review-answer {
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .review-answer .correct-ans {
            color: #00d4aa;
            font-weight: 700;
        }
        .review-answer .user-ans {
            color: #ff4757;
            font-weight: 600;
            text-decoration: line-through;
        }
        .review-explanation {
            background: #0a0a18;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #c0c0d0;
            border: 1px solid #222;
            line-height: 1.6;
        }
        .review-explanation strong {
            color: #ffa502;
        }
        .icon-indicator {
            font-size: 1.2rem;
            margin-left: 4px;
        }

        .welcome-screen {
            text-align: center;
            padding: 40px 28px;
        }
        .welcome-icon {
            font-size: 70px;
            margin-bottom: 16px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-18px);
            }
        }
        .welcome-screen h2 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 8px;
        }
        .welcome-screen p {
            color: var(--text2);
            margin-bottom: 20px;
            max-width: 500px;
            margin-inline: auto;
            font-size: 0.95rem;
        }
        .btn-start {
            background: linear-gradient(135deg, #4f8cff, #00d4aa);
            color: #fff;
            font-size: 1.1rem;
            padding: 16px 40px;
            border-radius: 32px;
            font-weight: 700;
            box-shadow: 0 6px 28px #4f8cff55;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 36px #4f8cff77;
        }
        .feature-grid {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .feature-item {
            background: var(--surface2);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 600px) {
            .app-header {
                padding: 16px;
                flex-direction: column;
                text-align: center;
            }
            .quiz-body {
                padding: 16px;
            }
            .question-card {
                padding: 16px;
            }
            .question-text {
                font-size: 1rem;
            }
            .option-item {
                padding: 12px 14px;
                font-size: 0.85rem;
            }
            .btn-row {
                padding: 0 16px 20px;
                gap: 8px;
            }
            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
            .score-circle {
                width: 110px;
                height: 110px;
            }
            .score-inner {
                width: 84px;
                height: 84px;
            }
            .score-number {
                font-size: 1.8rem;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="app-container" id="appContainer">
        <div class="app-header">
            <div class="logo-area">
                <div class="logo-icon">🛡️</div>
                <div>
                    <h1>اختبار أمن البرمجيات</h1>
                    <div class="subtitle">English Questions • Arabic Explanation</div>
                </div>
            </div>
            <div class="header-stats" id="headerStats">
                <div class="stat-badge"><span class="icon">📋</span> <span id="qCount">0/0</span></div>
                <div class="stat-badge timer-badge" id="timerBadge"><span class="icon">⏱</span> <span id="timerDisplay">00:00</span></div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-outer">
                <div class="progress-inner" id="progressBar" style="width: 0%;"></div>
            </div>
            <div class="progress-label">
                <span id="progressText">لم يبدأ</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div id="dynamicContent"></div>
        <div class="btn-row" id="btnRow"></div>
    </div>

    <script>
        (function() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 18 + 10 + 's';
                p.style.animationDelay = Math.random() * 15 + 's';
                particlesContainer.appendChild(p);
            }

            // ─── Questions: English text, Arabic explanations ───
            const questions = [{
                id: 1,
                q: 'What is the main goal of secure coding?',
                opts: ['Improve software performance.', 'Prevent security vulnerabilities in software.',
                    'Increase program complexity.', 'Reduce system memory usage.'
                ],
                correct: 1,
                expl: 'الترميز الآمن يهدف إلى <strong>منع الثغرات الأمنية</strong> من خلال كتابة كود resistant للهجمات مثل SQL Injection و XSS وغيرها.'
            }, {
                id: 2,
                q: 'Which secure coding practice helps prevent SQL injection attacks?',
                opts: ['Input validation.', 'Data compression.', 'Code duplication.', 'Debugging.'],
                correct: 0,
                expl: '<strong>التحقق من صحة الإدخال</strong> يضمن أن البيانات المدخلة مطابقة للتنسيق المتوقع، مما يمنع إدخال أوامر SQL خبيثة.'
            }, {
                id: 3,
                q: 'Storing passwords in plain text is dangerous because:',
                opts: ['It increases system speed.',
                    'Attackers can read all passwords if the database is compromised.',
                    'It improves authentication.', 'It reduces memory usage.'
                ],
                correct: 1,
                expl: 'إذا تم اختراق قاعدة البيانات، فإن <strong>تخزين كلمات المرور كنص واضح</strong> يعني أن المخترق يحصل على جميع كلمات المرور مباشرة دون أي جهد إضافي.'
            }, {
                id: 4,
                q: 'A developer builds SQL queries using string concatenation instead of parameterized queries. Which attack becomes possible?',
                opts: ['Cross-Site Request Forgery (CSRF).', 'Denial of Service.', 'Buffer Overflow.',
                    'SQL Injection.'
                ],
                correct: 3,
                expl: 'استخدام <strong>تسلسل النصوص (String Concatenation)</strong> لبناء استعلامات SQL يسمح للمهاجم بحقن أوامر SQL خبيثة عبر حقول الإدخال.'
            }, {
                id: 5,
                q: 'Which method is recommended for secure password storage?',
                opts: ['Plain text storage.', 'Password hashing.', 'Password printing.', 'Password compression.'],
                correct: 1,
                expl: '<strong>تجزئة كلمات المرور (Hashing)</strong> باستخدام خوارزميات مثل bcrypt أو Argon2 تحول كلمة المرور إلى قيمة غير قابلة للعكس، مما يحميها حتى لو تم اختراق قاعدة البيانات.'
            }, {
                id: 6,
                q: 'Showing detailed system error messages to users may lead to:',
                opts: ['Faster debugging.', 'Information leakage.', 'Better system performance.',
                    'Improved authentication.'
                ],
                correct: 1,
                expl: 'رسائل الخطأ التفصيلية قد تكشف <strong>معلومات حساسة</strong> مثل بنية قاعدة البيانات أو مسارات الملفات، مما يساعد المهاجمين في التخطيط لهجماتهم.'
            }, {
                id: 7,
                q: 'Which secure coding practice prevents unauthorized system access?',
                opts: ['Access control.', 'Data compression.', 'Code duplication.', 'Removing authentication.'],
                correct: 0,
                expl: '<strong>التحكم في الوصول</strong> يحدد من يمكنه الوصول إلى موارد النظام وماذا يمكنه أن يفعل، مما يمنع الوصول غير المصرح به.'
            }, {
                id: 8,
                q: 'What is input validation used for?',
                opts: ['Ensuring user input is safe and expected.', 'Increasing database size.', 'Compressing data.',
                    'Improving network speed.'
                ],
                correct: 0,
                expl: 'التحقق من صحة الإدخال يضمن أن <strong>البيانات المدخلة آمنة ومتوقعة</strong>، مما يمنع معالجة بيانات خبيثة قد تسبب ثغرات أمنية.'
            }, {
                id: 9,
                q: 'What is the main difference between Static Analysis and Dynamic Analysis?',
                opts: ['Static analysis runs the program.', 'Dynamic analysis checks code without running it.',
                    'Static analysis examines code without executing it.', 'Both methods are identical.'
                ],
                correct: 2,
                expl: '<strong>التحليل الثابت (SAST)</strong> يفحص الكود المصدري بدون تشغيل البرنامج، بينما التحليل الديناميكي (DAST) يختبر التطبيق أثناء تشغيله.'
            }, {
                id: 10,
                q: 'Which of the following is an example of secure coding practice?',
                opts: ['Displaying database errors to users.', 'Storing passwords in plain text.',
                    'Using parameterized queries.', 'Disabling security controls.'
                ],
                correct: 2,
                expl: '<strong>الاستعلامات المعلمية</strong> تفصل بين الكود والبيانات، مما يمنع هجمات حقن SQL بشكل فعال.'
            }, {
                id: 11,
                q: 'The Integrity principle in the CIA model ensures:',
                opts: ['Data remains unmodified.', 'Data is always available.', 'Data is encrypted.',
                    'Data is shared publicly.'
                ],

            // ─── App State ───
            const TOTAL_QUESTIONS = questions.length;
            let currentIndex = 0;
            let userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
            let timerSeconds = 0;
            let timerInterval = null;
            let examStarted = false;
            let examFinished = false;

            const dynamicContent = document.getElementById('dynamicContent');
            const btnRow = document.getElementById('btnRow');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const progressPercent = document.getElementById('progressPercent');
            const qCount = document.getElementById('qCount');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerBadge = document.getElementById('timerBadge');

            function startTimer() {
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    updateTimerDisplay();
                }, 1000);
            }

            function stopTimer() {
                clearInterval(timerInterval);
            }

            function updateTimerDisplay() {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                timerDisplay.textContent =
                    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            function getTimerString() {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            function updateProgress() {
                const answered = userAnswers.filter(a => a !== null).length;
                const pct = Math.round((answered / TOTAL_QUESTIONS) * 100);
                progressBar.style.width = pct + '%';
                progressPercent.textContent = pct + '%';
                progressText.textContent = answered + ' من ' + TOTAL_QUESTIONS + ' تمت الإجابة';
                qCount.textContent = (currentIndex + 1) + '/' + TOTAL_QUESTIONS;
            }

            function renderWelcome() {
                dynamicContent.innerHTML = `
                <div class="welcome-screen">
                  <div class="welcome-icon">🛡️</div>
                  <h2>Software Security MCQ Exam</h2>
                  <p>اختبر معرفتك من خلال <strong>${TOTAL_QUESTIONS} سؤال</strong> باللغة الإنجليزية، مع شرح مفصل بالعربية بعد كل إجابة.</p>
                  <div class="feature-grid">
                    <div class="feature-item"><span>📋</span> ${TOTAL_QUESTIONS} English Questions</div>
                    <div class="feature-item"><span>⏱</span> مؤقت للاختبار</div>
                    <div class="feature-item"><span>✅</span> تصحيح مع شرح عربي</div>
                    <div class="feature-item"><span>📊</span> تقرير مفصل بالنتائج</div>
                  </div>
                  <button class="btn-start" onclick="startExam()">🚀 ابدأ الاختبار الآن</button>
                </div>`;
                btnRow.innerHTML = '';
                progressBar.style.width = '0%';
                progressPercent.textContent = '0%';
                progressText.textContent = 'لم يبدأ';
                qCount.textContent = '0/' + TOTAL_QUESTIONS;
                timerDisplay.textContent = '00:00';
                timerBadge.classList.remove('timer-badge');
                timerBadge.style.borderColor = '#2a2a40';
                timerBadge.style.color = '#b0b0c0';
            }

            function renderQuestion() {
                if (examFinished) return;
                const q = questions[currentIndex];
                const selected = userAnswers[currentIndex];
                let optsHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                q.opts.forEach((opt, i) => {
                    const selClass = selected === i ? ' selected' : '';
                    optsHTML += `
                    <li class="option-item${selClass}" onclick="selectOption(${i})">
                      <span class="option-radio"></span>
                      <span class="option-letter">${letters[i]}</span>
                      <span>${opt}</span>
                    </li>`;
                });
                dynamicContent.innerHTML = `
                <div class="quiz-body">
                  <div class="question-card">
                    <span class="question-number">Question ${currentIndex + 1} of ${TOTAL_QUESTIONS}</span>
                    <div class="question-text">${q.q}</div>
                    <ul class="options-list">${optsHTML}</ul>
                  </div>
                </div>`;
                renderButtons();
                updateProgress();
            }

            function renderButtons() {
                let html = '';
                html +=
                    `<button class="btn btn-prev" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>⬅️ السابق</button>`;
                if (currentIndex < TOTAL_QUESTIONS - 1) {
                    html += `<button class="btn btn-next" onclick="nextQuestion()">التالي ➡️</button>`;
                } else {
                    html +=
                        `<button class="btn btn-submit" onclick="submitExam()">✅ إنهاء الاختبار وعرض النتيجة</button>`;
                }
                btnRow.innerHTML = html;
            }

            window.selectOption = function(optionIndex) {
                if (examFinished) return;
                userAnswers[currentIndex] = optionIndex;
                renderQuestion();
            };
            window.nextQuestion = function() {
                if (currentIndex < TOTAL_QUESTIONS - 1) {
                    currentIndex++;
                    renderQuestion();
                    dynamicContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };
            window.prevQuestion = function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                    dynamicContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            window.startExam = function() {
                examStarted = true;
                examFinished = false;
                currentIndex = 0;
                userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
                timerSeconds = 0;
                updateTimerDisplay();
                timerBadge.classList.add('timer-badge');
                startTimer();
                renderQuestion();
                dynamicContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            window.submitExam = function() {
                if (examFinished) return;
                const skipped = userAnswers.filter(a => a === null).length;
                if (skipped > 0) {
                    const confirmSubmit = confirm(
                        `⚠️ لديك ${skipped} سؤال بدون إجابة. هل تريد إنهاء الاختبار وعرض النتيجة؟`);
                    if (!confirmSubmit) return;
                }
                examFinished = true;
                stopTimer();
                timerBadge.classList.remove('timer-badge');
                timerBadge.style.borderColor = '#2a2a40';
                timerBadge.style.color = '#b0b0c0';
                renderResults();
            };

            function renderResults() {
                let correctCount = 0;
                let wrongCount = 0;
                let skippedCount = 0;
                const reviewCards = [];

                questions.forEach((q, i) => {
                    const userAns = userAnswers[i];
                    const isCorrect = userAns === q.correct;
                    const isSkipped = userAns === null;
                    if (isSkipped) skippedCount++;
                    else if (isCorrect) correctCount++;
                    else wrongCount++;

                    let cardClass = 'review-card';
                    let statusIcon = '';
                    let userAnsText = '';
                    if (isSkipped) {
                        cardClass += ' skipped-card';
                        statusIcon = '⚠️';
                        userAnsText = '<span style="color:#ffa502;">لم تتم الإجابة</span>';
                    } else if (isCorrect) {
                        cardClass += ' correct-card';
                        statusIcon = '✅';
                        userAnsText = `<span class="correct-ans">${q.opts[userAns]}</span>`;
                    } else {
                        cardClass += ' wrong-card';
                        statusIcon = '❌';
                        userAnsText = `<span class="user-ans">${q.opts[userAns]}</span>`;
                    }

                    reviewCards.push(`
                    <div class="${cardClass}">
                      <div class="review-q"><span class="icon-indicator">${statusIcon}</span> سؤال ${i + 1}: ${q.q}</div>
                      <div class="review-answer">إجابتك: ${userAnsText}</div>
                      <div class="review-answer">الإجابة الصحيحة: <span class="correct-ans">${q.opts[q.correct]}</span></div>
                      <div class="review-explanation">💡 <strong>الشرح:</strong> ${q.expl}</div>
                    </div>`);
                });

                const scorePct = Math.round((correctCount / TOTAL_QUESTIONS) * 100);
                let gradeClass = 'grade-poor';
                let gradeText = 'بحاجة للتحسين';
                if (scorePct >= 90) { gradeClass = 'grade-excellent';
                    gradeText = 'ممتاز! 🌟'; } else if (scorePct >= 70) { gradeClass = 'grade-good';
                    gradeText = 'جيد جداً 👍'; } else if (scorePct >= 50) { gradeClass = 'grade-fair';
                    gradeText = 'مقبول 📚'; }

                const timerStr = getTimerString();

                dynamicContent.innerHTML = `
                <div class="results-container" style="--score-pct:${scorePct};">
                  <div class="results-hero">
                    <div class="score-circle">
                      <div class="score-inner">
                        <span class="score-number">${scorePct}%</span>
                        <span class="score-total">النتيجة</span>
                      </div>
                    </div>
                    <div class="results-grade ${gradeClass}">${gradeText}</div>
                  </div>
                  <div class="results-stats">
                    <div class="result-stat"><div class="val correct">${correctCount}</div><div class="lbl">✅ صحيحة</div></div>
                    <div class="result-stat"><div class="val wrong">${wrongCount}</div><div class="lbl">❌ خاطئة</div></div>
                    <div class="result-stat"><div class="val skipped">${skippedCount}</div><div class="lbl">⚠️ بدون إجابة</div></div>
                    <div class="result-stat"><div class="val" style="color:#c0c0d0;">${timerStr}</div><div class="lbl">⏱ الوقت</div></div>
                  </div>
                  <h3 style="margin-bottom:14px;color:#fff;">📋 مراجعة الأسئلة:</h3>
                  <div class="review-section">${reviewCards.join('')}</div>
                </div>`;
                btnRow.innerHTML =
                    `<button class="btn btn-next" onclick="restartExam()" style="margin:0 auto;">🔄 إعادة الاختبار</button>`;
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                progressText.textContent = 'اكتمل الاختبار';
                qCount.textContent = TOTAL_QUESTIONS + '/' + TOTAL_QUESTIONS;
                dynamicContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            window.restartExam = function() {
                stopTimer();
                examStarted = false;
                examFinished = false;
                currentIndex = 0;
                userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
                timerSeconds = 0;
                updateTimerDisplay();
                timerBadge.classList.remove('timer-badge');
                timerBadge.style.borderColor = '#2a2a40';
                timerBadge.style.color = '#b0b0c0';
                renderWelcome();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            document.addEventListener('keydown', function(e) {
                if (examFinished || !examStarted) return;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (currentIndex < TOTAL_QUESTIONS - 1) {
                        currentIndex++;
                        renderQuestion();
                        dynamicContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentIndex > 0) {
                        currentIndex--;
                        renderQuestion();
                        dynamicContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                } else if (e.key >= '1' && e.key <= '4') {
                    e.preventDefault();
                    const optIndex = parseInt(e.key) - 1;
                    if (optIndex < questions[currentIndex].opts.length) {
                        userAnswers[currentIndex] = optIndex;
                        renderQuestion();
                    }
                } else if (e.key === 'Enter' && currentIndex === TOTAL_QUESTIONS - 1) {
                    e.preventDefault();
                    window.submitExam();
                }
            });

            renderWelcome();
            updateTimerDisplay();

            console.log('🛡️ Software Security Exam Ready | ' + TOTAL_QUESTIONS +
                ' English Questions | Arabic Explanations');
        })();
    </script>
</body>
</html>
